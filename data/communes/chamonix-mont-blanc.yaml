license_notes: >
  Zone tendue. Since 1 May 2025: change-of-use authorization required for renting
  second homes as meublés de tourisme; quota of 1 authorization per natural person
  in Chamonix & Les Houches; new PLU aims to ban new second-home construction.
  Buying here to short-term rent is effectively blocked unless the property already
  has rights or you make it a primary residence. Verified 2026-07.
